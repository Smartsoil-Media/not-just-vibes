name: ci

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: install · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

      - run: pnpm test

      - name: drizzle migrations in sync with schema
        run: pnpm --filter @njv/server db:check

      - run: pnpm -r --filter=./apps/* run build
